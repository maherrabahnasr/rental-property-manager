<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rental Property Manager</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 10px;
        }

        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px; /* Prevents iOS zoom on focus */
            background-color: var(--bg);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        button {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            transition: transform 0.1s, opacity 0.2s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary); padding: 14px; font-size: 1.1rem;}
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }
        .btn-edit { background-color: #64748b; }

        /* Desktop Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 15px 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--bg);
            font-weight: 600;
            color: #475569;
        }

        .status-behind { color: var(--danger); font-weight: 700; }
        .status-current { color: var(--success); font-weight: 700; }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons a {
            text-decoration: none;
            flex: 1;
        }

        /* Mobile Responsive Table styling */
        @media screen and (max-width: 768px) {
            table {
                border: 0;
            }
            
            table caption {
                font-size: 1.3em;
            }
            
            table thead {
                border: none;
                clip: rect(0 0 0 0);
                height: 1px;
                margin: -1px;
                overflow: hidden;
                padding: 0;
                position: absolute;
                width: 1px;
            }
            
            table tr {
                border: 1px solid var(--border);
                display: block;
                margin-bottom: 20px;
                border-radius: 12px;
                background-color: var(--bg);
                padding: 10px;
            }
            
            table td {
                border-bottom: 1px solid var(--border);
                display: block;
                font-size: 0.95em;
                text-align: right;
                padding: 12px 10px;
            }
            
            table td::before {
                /*
                * aria-label has no advantage, it won't be read inside a table
                content: attr(aria-label);
                */
                content: attr(data-label);
                float: left;
                font-weight: bold;
                text-transform: uppercase;
                font-size: 0.85em;
                color: #64748b;
            }
            
            table td:last-child {
                border-bottom: 0;
            }

            .action-buttons {
                flex-direction: column;
                width: 100%;
            }

            table td.action-cell {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding-top: 15px;
            }

            table td.action-cell::before {
                display: none; /* Hide labels for button rows on mobile to save space */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rental Property Manager</h1>

    <div class="card">
        <h2 id="formTitle">Add New Property & Tenant</h2>
        <form id="propertyForm">
            <input type="hidden" id="editId">
            <div class="form-group">
                <div>
                    <label>Property Address</label>
                    <input type="text" id="address" required placeholder="e.g., 123 Main St">
                </div>
                <div>
                    <label>Tenant Name</label>
                    <input type="text" id="tenant" required placeholder="e.g., Jane Doe">
                </div>
                <div>
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="555-123-4567">
                </div>
                <div>
                    <label>Rent Due Date</label>
                    <select id="dueDate" required>
                        <option value="1st">1st of the month</option>
                        <option value="5th">5th of the month</option>
                        <option value="15th">15th of the month</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="isBehind">
                    <label for="isBehind">Currently behind on rent</label>
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Save Property</button>
        </form>
    </div>

    <div class="card">
        <h2>Property List</h2>
        <table id="propertyTable">
            <thead>
                <tr>
                    <th>Address</th>
                    <th>Tenant</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Messaging</th>
                    <th>Manage</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // Initial data structure
    let properties = [
        { id: 1, address: 'Melvindale Unit A', tenant: 'nounou', phone: '3135550101', dueDate: '1st', isBehind: false },
        { id: 2, address: 'Downtown Condo', tenant: 'ryry', phone: '3135550102', dueDate: '5th', isBehind: true }
    ];

    const form = document.getElementById('propertyForm');
    const tableBody = document.getElementById('tableBody');
    const formTitle = document.getElementById('formTitle');
    const submitBtn = document.getElementById('submitBtn');

    // Canned Messages
    const msgThankYou = "Hi, just confirming I received the rent for this month. Thank you!";
    const msgReminder = "Hello, I haven't received the rent for this month yet. Please let me know when you plan to send it.";

    function renderTable() {
        tableBody.innerHTML = '';
        properties.forEach(prop => {
            const statusClass = prop.isBehind ? 'status-behind' : 'status-current';
            const statusText = prop.isBehind ? 'Behind' : 'Current';
            
            // Format phone number for the SMS link by stripping non-numeric characters
            const cleanPhone = prop.phone.replace(/\D/g, '');

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td data-label="Address">${prop.address}</td>
                <td data-label="Tenant"><strong>${prop.tenant}</strong><br><small style="color: #64748b;">${prop.phone}</small></td>
                <td data-label="Due Date">${prop.dueDate}</td>
                <td data-label="Status" class="${statusClass}">${statusText}</td>
                <td data-label="Messaging" class="action-cell">
                    <div class="action-buttons">
                        <a href="sms:${cleanPhone}?body=${encodeURIComponent(msgThankYou)}">
                            <button class="btn-success">Send Thank You</button>
                        </a>
                        <a href="sms:${cleanPhone}?body=${encodeURIComponent(msgReminder)}">
                            <button class="btn-danger">Send Reminder</button>
                        </a>
                    </div>
                </td>
                <td data-label="Manage" class="action-cell">
                    <div class="action-buttons">
                        <button class="btn-edit" onclick="editProperty(${prop.id})">Edit</button>
                        <button class="btn-danger" style="background-color: #94a3b8;" onclick="deleteProperty(${prop.id})">Delete</button>
                    </div>
                </td>
            `;
            tableBody.appendChild(tr);
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const id = document.getElementById('editId').value;
        const newProperty = {
            id: id ? parseInt(id) : Date.now(),
            address: document.getElementById('address').value,
            tenant: document.getElementById('tenant').value,
            phone: document.getElementById('phone').value,
            dueDate: document.getElementById('dueDate').value,
            isBehind: document.getElementById('isBehind').checked
        };

        if (id) {
            // Update existing
            properties = properties.map(p => p.id === newProperty.id ? newProperty : p);
            formTitle.textContent = "Add New Property & Tenant";
            submitBtn.textContent = "Save Property";
        } else {
            // Add new
            properties.push(newProperty);
        }

        form.reset();
        document.getElementById('editId').value = '';
        renderTable();
    });

    window.editProperty = function(id) {
        const prop = properties.find(p => p.id === id);
        if (prop) {
            document.getElementById('editId').value = prop.id;
            document.getElementById('address').value = prop.address;
            document.getElementById('tenant').value = prop.tenant;
            document.getElementById('phone').value = prop.phone;
            document.getElementById('dueDate').value = prop.dueDate;
            document.getElementById('isBehind').checked = prop.isBehind;
            
            formTitle.textContent = "Edit Property";
            submitBtn.textContent = "Update Property";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    };

    window.deleteProperty = function(id) {
        if (confirm('Are you sure you want to delete this property?')) {
            properties = properties.filter(p => p.id !== id);
            renderTable();
        }
    };

    // Initial render
    renderTable();
</script>

</body>
</html>
